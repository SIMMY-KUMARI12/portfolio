<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Personal Portfolio</title>

  
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="container">

            <nav>

                <div class="logo">My Portfolio</div>

                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#skills">Skills</a></li>
                    <li><a href="#education">Education</a></li>
                    <li><a href="#certificate">Certificate</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>

            </nav>

        </div>

    </header>


    <!-- ================= HOME ================= -->

    <section id="home">

        <div class="container home-content">

            <div class="home-text">

                <h1 id="home-name"></h1>

                <h3 id="home-role"></h3>

                <p id="home-description"></p>

            </div>

            <div class="home-image">

                <img id="profile-image" alt="Profile Photo">

            </div>

        </div>

    </section>


    <!-- ================= ABOUT ================= -->

    <section id="about">

        <div class="container">

            <h2>About Me</h2>

            <div class="about-content">

                <!-- LEFT SIDE IMAGE -->
                <div class="about-image">
                    <img src="your-photo.jpg" alt="About Image">
                </div>

                <!-- RIGHT SIDE TEXT -->
                <div class="about-text-box">
                    <p id="about-text"></p>
                </div>

            </div>

        </div>

    </section>


    <!-- ================= SKILLS ================= -->

    <section id="skills">

        <div class="container">

            <h2>Skills</h2>

            <div class="section-box">

                <ul class="skills-list" id="skills-list"></ul>

            </div>

        </div>

    </section>
    <!-- ================= PROJECTS ================= -->

    <!-- ================= PROJECTS ================= -->

    <section id="projects">
        <div class="container">
            <h2>Projects</h2>

            <!-- JS will inject project cards here -->
            <div class="project-container" id="project-container"></div>
        </div>
    </section>

    <!-- ================= EDUCATION ================= -->

    <section id="education">

        <div class="container">

            <h2>Education</h2>

            <div class="education-container" id="education-container"></div>

        </div>

    </section>


    <!-- ================= CERTIFICATES ================= -->

    <section id="certificate">

        <div class="container">

            <h2>Certificates</h2>

            <div class="certificate-container" id="certificate-container"></div>

        </div>

    </section>


    <!-- ================= CONTACT ================= -->

    <section id="contact">

        <div class="container">

            <h2>Contact</h2>

            <div class="section-box">

                <ul class="contact-list">

                    <li>
                        <a id="email-link" href="#">
                            <i class="fa-solid fa-envelope icon email"></i>
                            Email
                        </a>
                    </li>

                    <li>
                        <a id="phone-link" href="#">
                            <i class="fa-solid fa-phone icon phone"></i>
                            Phone
                        </a>
                    </li>

                    <li>
                        <a id="linkedin-link" href="#" target="_blank">
                            <i class="fa-brands fa-linkedin-in icon linkedin"></i>
                            LinkedIn
                        </a>
                    </li>

                    <li>
                        <a id="github-link" href="#" target="_blank">
                            <i class="fa-brands fa-github icon github"></i>
                            GitHub
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </section>


    <!-- ================= FOOTER ================= -->

    <footer>

        <p id="footer-text"></p>

    </footer>
</body>

</html>
